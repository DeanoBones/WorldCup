<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ World Cup Challenge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    background:#020617;
}

/* 🔴 LIVE TICKER */
.livebar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(255,0,0,0.15);
    backdrop-filter:blur(10px);
    z-index:1000;
    overflow:hidden;
    padding:10px 0;
}

.ticker{
    display:inline-block;
    white-space:nowrap;
    padding-left:100%;
    animation:scroll 18s linear infinite;
    font-weight:700;
    letter-spacing:1px;
}

@keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* 🌍 BACKGROUND */
.bg{
    position:fixed;
    inset:-50%;
    background:
        radial-gradient(circle at 20% 20%, rgba(14,165,233,0.2), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(34,197,94,0.2), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(234,179,8,0.2), transparent 40%);
    animation: move 12s linear infinite;
    z-index:-3;
}

@keyframes move{
    0%{transform:rotate(0deg) scale(1);}
    100%{transform:rotate(360deg) scale(1.2);}
}

/* 🏆 TROPHY */
.trophy{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    height:75vh;
    opacity:0.07;
    z-index:-1;
    pointer-events:none;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.15));
    animation: breathe 5s ease-in-out infinite;
}

@keyframes breathe{
    0%,100%{transform:translate(-50%,-50%) scale(1); opacity:0.06;}
    50%{transform:translate(-50%,-50%) scale(1.05); opacity:0.1;}
}

/* PARTICLES */
.particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-2;
}

.particles span{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.15;
    animation: float 10s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh); opacity:0;}
    20%{opacity:0.3;}
    to{transform:translateY(-10vh); opacity:0;}
}

/* CONTAINER */
.container{
    position:relative;
    z-index:2;
    max-width:1100px;
    margin:auto;
    padding:60px 20px 30px;
}

.hero{
    text-align:center;
    margin-bottom:40px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:10px;
}

.hero p{
    color:#cbd5e1;
}

/* PODIUM */
.podium{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    align-items:end;
    margin-bottom:40px;
}

.place{
    border-radius:20px;
    padding:25px;
    text-align:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    cursor:pointer;
}

.place:hover{
    transform: translateY(-8px) scale(1.03);
    background:rgba(255,255,255,0.12);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* subtle glow for 1st place */
.first:hover{
    box-shadow:0 0 25px rgba(255,215,0,0.25), 0 15px 40px rgba(0,0,0,0.4);
}
.name{
    font-size:1.5rem;
    font-weight:700;
    letter-spacing:0.5px;
    transition: color 0.2s ease;
}

.place:hover .name{
    color:#ffffff;
}
.first{min-height:320px;border:2px solid gold;}
.second{min-height:260px;}
.third{min-height:220px;}

.medal{font-size:3rem;margin-bottom:10px;}
.name{font-size:1.5rem;font-weight:700;}
.balance{font-size:2rem;margin-top:15px;font-weight:800;}

.positive{color:#4ade80;}
.negative{color:#f87171;}

.loading{
    text-align:center;
    font-size:1.4rem;
    color:#cbd5e1;
    margin:60px 0;
}

@keyframes bubbleIn{
    0%{
        opacity:0;
        transform:translateY(40px) scale(0.9);
    }
    60%{
        transform:translateY(-8px) scale(1.05);
    }
    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.place{
    opacity:0;
    animation:bubbleIn 0.7s forwards;
}

.board{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(15px);
    margin-top:30px;
}

.board h2{
    margin-bottom:15px;
}

.rules{
    padding-left:20px;
    line-height:1.8;
    color:#cbd5e1;
}

.rules li{
    margin-bottom:8px;
}
</style>
</head>

<body>

<div class="livebar">
    <div class="ticker" id="ticker">🔴 LIVE WORLD CUP CHALLENGE • Loading...</div>
</div>

<div class="bg"></div>
<img src="trophy.png" class="trophy" />
<div class="particles" id="particles"></div>

<div class="container">

    <div class="hero">
        <h1>⚽ World Cup Challenge</h1>
        <p>$1 per match • Highest balance wins</p>
    </div>

    <div id="content"></div>

</div>

<script>
const START_BALANCE = 100;
const PUSD_CONTRACT = "0xc011a7e12a19f7b1f670d46f03b03f3342e82dfb";

const players = [
    { name:"Bucky", wallet:"0xa4ddc37CC742ee42F048DE46d17392cDDbcCF17F" },
    { name:"Aust",  wallet:"0x642bf0638DA4a03d92CE6c1D2c45CC2916AD33ec" },
    { name:"John",  wallet:"0xCc126ee5d88484ea8B46451a5870f20950297aC5" }
];

let results = [];
const RPC_URL = "https://1rpc.io/matic";

async function getBalance(wallet, maxRetries = 3) {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
            const address = wallet.toLowerCase().replace("0x","").padStart(64,"0");
            const data = "0x70a08231" + address;

            const res = await fetch(RPC_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    jsonrpc: "2.0",
                    id: 1,
                    method: "eth_call",
                    params: [{ to: PUSD_CONTRACT, data }, "latest"]
                })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const json = await res.json();
            if (!json.result) throw new Error("No result");

            const balance = Number(BigInt(json.result)) / 1_000_000;

            console.log(`✅ ${wallet.slice(0,8)}... balance fetched on attempt ${attempt}: $${balance.toFixed(2)}`);
            return balance;

        } catch (err) {
            console.warn(`Attempt ${attempt}/${maxRetries} failed for ${wallet.slice(0,8)}...`, err.message);
            
            if (attempt < maxRetries) {
                const waitTime = attempt === 1 ? 8000 : 10000; // 8s first retry, 10s after
                document.querySelector('.loading').textContent = 
                    `⚽ Retrying ${wallet.slice(0,6)}... (Attempt ${attempt + 1})`;
                
                await new Promise(r => setTimeout(r, waitTime));
            }
        }
    }
    
    console.error(`❌ Failed to fetch balance for ${wallet.slice(0,8)}... after ${maxRetries} attempts`);
    return 0; // Final fallback
}

function pnl(b) {
    return ((b - START_BALANCE) / START_BALANCE) * 100;
}

function updateTicker() {
    if (results.length === 0) return;
    const sorted = [...results].sort((a, b) => b.balance - a.balance);
    const leader = sorted[0];
    const gap = sorted[1] ? Math.abs(leader.balance - sorted[1].balance).toFixed(2) : "0.00";

    document.getElementById("ticker").textContent = 
        `🔴 LIVE • ${leader.name} leads by $${gap}`;
}

function createPlaceElement(p, index) {
    const percent = pnl(p.balance);
    const medals = ["🥇", "🥈", "🥉"];

    const div = document.createElement("div");
    div.className = `place ${index === 0 ? "first" : index === 1 ? "second" : "third"}`;
    div.style.opacity = "0";

    div.innerHTML = `
        <div class="medal">${medals[index] || "🏅"}</div>
        <div class="name">${p.name}</div>
        <div class="balance">$${p.balance.toFixed(2)}</div>
        <div class="${percent >= 0 ? "positive" : "negative"}">
            ${percent >= 0 ? "+" : ""}${percent.toFixed(1)}%
        </div>
    `;

    setTimeout(() => {
        div.style.transition = "all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)";
        div.style.transform = "translateY(50px) scale(0.5)";
        div.style.opacity = "1";
        setTimeout(() => div.style.transform = "translateY(0) scale(1)", 30);
    }, 80);

    return div;
}

function renderPodium() {
    const podium = document.getElementById("podium");
    if (!podium) return;

    const sorted = [...results].sort((a, b) => b.balance - a.balance);
    podium.innerHTML = '';

    sorted.forEach((player, i) => {
        podium.appendChild(createPlaceElement(player, i));
    });
}

async function refresh() {
    try {
        document.getElementById("content").innerHTML = `
            <div class="podium" id="podium"></div>
            <div class="loading">⚽ Fetching live balances...</div>

            <!-- Rules Section -->
            <div class="board">
                <h2>📜 Rules</h2>
                <ul class="rules">
                    <li>Each participant starts with $100 bankroll.</li>
                    <li>Participants place $1 bets on each World Cup match through the Bet Manager.</li>
                    <li>The participant with the highest account balance at the end of the World Cup is declared the winner.</li>
                    <li>Bets must be submitted with sufficient notice before kick-off.</li>
                    <li>For early morning matches, bets must be submitted the night before.</li>
                    <li>Late betting requests may be refused if the Bet Manager is unable to place them in time.</li>
                    <li>The Bet Manager has final discretion regarding bet submission deadlines and placement.</li>
                </ul>
            </div>

            <!-- Rewards / Penalty Section -->
            <div class="board" style="margin-top: 25px;">
                <h2>🏆 Rewards & Consequences</h2>
                <ul class="rules">
                    <li>The winner may choose a game costing up to $30 USD for each losing participant to purchase.</li>
                    <li>The winner may wait for a sale before selecting the game.</li>
                    <li>The game must be chosen before 1 January 2027, otherwise the obligation expires.</li>
                    <li>Each loser must play the chosen game for a minimum of 20 hours.</li>
                </ul>
            </div>
        `;

        results = [];

        for (const player of players) {
            const balance = await getBalance(player.wallet);
            results.push({ ...player, balance });

            renderPodium();
            updateTicker();

            await new Promise(r => setTimeout(r, 900));
        }

        document.querySelector('.loading')?.remove();

    } catch (err) {
        console.error(err);
        const loadingEl = document.querySelector('.loading');
        if (loadingEl) loadingEl.innerHTML = `❌ Failed to load balances. Check console (F12)`;
    }
}

// Start
refresh();
</script>

</body>
</html>
